services:
  postgres:
    image: postgres:16
    container_name: glow_backend_postgres
    restart: always
    environment:
      POSTGRES_DB: glow_backend_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - glow_backend_postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: glow_backend_api
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - /app/node_modules
      
  frontend:
    build:
      context: ./frontend

    container_name: glow_frontend

    restart: always

    ports:
      - "3000:80"

    depends_on:
      - backend

volumes:
  glow_backend_postgres_data: